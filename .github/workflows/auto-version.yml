name: Auto-versie bijwerken

on:
  push:
    branches: [main]

jobs:
  update-version:
    # Voorkom oneindige loop: sla over als commit van deze action zelf is
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Versie ophogen en datum bijwerken
        run: |
          # Nederlandse maandnamen
          EN=$(date +'%b')
          case $EN in
            Jan) NL="jan" ;; Feb) NL="feb" ;; Mar) NL="mrt" ;;
            Apr) NL="apr" ;; May) NL="mei" ;; Jun) NL="jun" ;;
            Jul) NL="jul" ;; Aug) NL="aug" ;; Sep) NL="sep" ;;
            Oct) NL="okt" ;; Nov) NL="nov" ;; Dec) NL="dec" ;;
          esac
          DATE="$(date +'%-d') $NL $(date +'%Y')"

          # Huidige versie lezen en patch ophogen (v1.0.18 → v1.0.19)
          CURRENT=$(grep -oP "(?<=SW_VERSION = ')v\d+\.\d+\.\d+" sw.js)
          MAJOR=$(echo $CURRENT | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW_VERSION="v$MAJOR.$MINOR.$((PATCH + 1))"

          echo "Versie: $CURRENT → $NEW_VERSION · $DATE"

          # sw.js bijwerken
          sed -i "s/const SW_VERSION = '$CURRENT';/const SW_VERSION = '$NEW_VERSION';/" sw.js
          sed -i "s/const SW_DATE.*=.*;/const SW_DATE    = '$DATE';/" sw.js

          # version.json bijwerken
          echo "{\"v\":\"$NEW_VERSION\",\"date\":\"$DATE\"}" > version.json

      - name: Commit en push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add sw.js version.json
          git diff --staged --quiet || git commit -m "Auto: versie opgehoogd naar $(grep -oP "(?<=SW_VERSION = ')v[^']+" sw.js) · $(date +'%d %b %Y') [skip ci]"
          git push
