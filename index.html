<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Mijn Week" />
<meta name="theme-color" content="#1a1a2e" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<title>Mijn Week</title>
<style>
  body { margin:0; background:#1a1a2e; display:flex; align-items:center; justify-content:center; height:100vh; }
  .loader { width:40px; height:40px; border:4px solid rgba(255,255,255,.15); border-top-color:#4f8ef7; border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="loader"></div>
<script>
  // Registreer service worker zo vroeg mogelijk
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // Haal altijd de nieuwste versie op – bypast iOS HTTP-cache via cache-buster
  fetch('version.json?_=' + Date.now(), { cache: 'no-store' })
    .then(r => r.json())
    .then(({ v }) => {
      location.replace('app.html?_v=' + encodeURIComponent(v || 'latest'));
    })
    .catch(() => {
      location.replace('app.html?_v=' + Date.now());
    });
</script>
</body>
</html>
