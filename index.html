<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Mijn Week" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<title>Mijn Week</title></head>
<body>
<script>
// Haal altijd de nieuwste versie op via version.json
fetch('version.json?_='+Date.now(),{cache:'no-store'})
  .then(r=>r.json()).then(({v})=>{
    location.replace('app.html?_v='+encodeURIComponent(v||'latest'));
  }).catch(()=>{ location.replace('app.html'); });
</script>
<a href="app.html">Open Mijn Week →</a>
</body>
</html>
